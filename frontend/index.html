<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="DM_Tools — unified GEO, AIO, SEO, Martech dashboard." />
    <title>DM_Tools — Digital Marketing Dashboard</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="bg-bg text-fg antialiased">
    <div id="app" class="flex min-h-screen">
      <!-- Sidebar -->
      <aside id="sidebar" class="w-64 shrink-0 border-r border-border bg-surface flex flex-col">
        <div class="px-5 py-4 border-b border-border flex items-center gap-2">
          <div class="w-8 h-8 rounded-lg bg-accent flex items-center justify-center font-bold text-white">DM</div>
          <div>
            <div class="font-semibold leading-tight">DM_Tools</div>
            <div class="text-xs text-muted">v0.2 · localhost</div>
          </div>
        </div>
        <nav id="nav" class="flex-1 overflow-y-auto p-2 space-y-1"></nav>
        <div class="p-3 border-t border-border space-y-2">
          <button id="theme-toggle" class="btn btn-ghost w-full justify-between" title="Toggle dark / light theme">
            <span class="flex items-center gap-2"><span class="theme-icon">🌙</span> Theme</span>
            <span class="text-xs text-muted theme-label">dark</span>
          </button>
          <button id="open-settings" class="btn btn-ghost w-full justify-between">
            <span class="flex items-center gap-2">⚙️ Settings</span>
            <span class="text-xs text-muted">⌘,</span>
          </button>
        </div>
      </aside>

      <!-- Main panel -->
      <main class="flex-1 flex flex-col min-w-0">
        <header class="border-b border-border bg-surface/60 backdrop-blur px-6 py-3 flex items-center justify-between">
          <div>
            <h1 id="page-title" class="text-lg font-semibold leading-tight">Dashboard</h1>
            <p id="page-subtitle" class="text-sm text-muted">Welcome to DM_Tools.</p>
          </div>
          <div class="flex items-center gap-3">
            <span id="active-profile" class="text-xs text-muted hidden sm:inline"></span>
            <span id="api-status" class="dot dot-muted" title="API status"></span>
          </div>
        </header>
        <section id="view" class="flex-1 overflow-y-auto p-6"></section>
      </main>
    </div>

    <!-- Toasts container -->
    <div id="toasts" class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <!-- Modal mount point -->
    <div id="modal-root"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
